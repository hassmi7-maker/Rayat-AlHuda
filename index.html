<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب راية الهدى بالجارودية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .site-header {
            width: 100%;
            background-color: #262626;
            border-bottom: 2px solid #d4af37;
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
        }

        .site-logo { width: 90px; height: auto; }
        .site-title { color: #d4af37; font-size: 1.6rem; margin: 0; font-weight: bold; }

        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #262626;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 15px; }

        .choice-btn {
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        /* تنسيق الجدول */
        .main-content { display: none; text-align: center; width: 100%; max-width: 600px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #262626;
            border: 1px solid #d4af37;
        }

        th, td {
            border: 1px solid #444;
            padding: 12px;
            text-align: center;
        }

        th { background-color: #333; color: #d4af37; }

        select {
            padding: 8px;
            background-color: #1a1a1a;
            color: #f4f4f4;
            border: 1px solid #d4af37;
            border-radius: 5px;
            font-family: inherit;
        }

        .back-btn {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .site-header { flex-direction: row; gap: 20px; }
            .site-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="site-header" onclick="goHome()">
        <img src="m-logo.png" alt="شعار" class="site-logo" onerror="this.src='m-logo'">
        <h1 class="site-title">موكب راية الهدى بالجارودية</h1>
    </header>

    <div class="main-wrapper">
        <div id="welcomeModal" class="modal-content">
            <div class="btn-container">
                <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
                <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
            </div>
        </div>

        <div id="mainContent" class="main-content">
            <h2 style="color: #d4af37; font-size: 2rem;">قسم <span id="sectionName"></span></h2>
            
            <div id="tableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>التاريخ (ميلادي)</th>
                            <th>التحضير بواسطة</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="currentDate">-- / -- / ----</td>
                            <td>
                                <select>
                                    <option value="">اختر الاسم...</option>
                                    <option>نادر المعراج</option>
                                    <option>عباس المعلم</option>
                                    <option>حسن المعراج</option>
                                    <option>سيد محمد نوري</option>
                                    <option>حسن الرمضان</option>
                                </select>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button class="back-btn" onclick="goHome()">⬅ العودة للرئيسية</button>
        </div>
    </div>

    <script>
        function selectSection(name) {
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('sectionName').innerText = name;
            
            // تحديث التاريخ تلقائياً عند الدخول
            if(name === 'مهدويون') {
                const today = new Date();
                const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
                document.getElementById('currentDate').innerText = today.toLocaleDateString('en-GB', options);
            }
        }

        function goHome() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('welcomeModal').style.display = 'block';
        }
    </script>
</body>
</html>
