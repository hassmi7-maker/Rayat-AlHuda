<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب راية الهدى بالجارودية</title>
    <style>
        :root { --gold: #d4af37; --bg: #1a1a1a; --card: #262626; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: #f4f4f4; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .site-header { width: 100%; background-color: var(--card); border-bottom: 2px solid var(--gold); padding: 15px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .site-logo { width: 80px; height: auto; }
        .site-title { color: var(--gold); font-size: 1.6rem; margin: 0; font-weight: bold; }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* نافذة الاختيار الرئيسية */
        .modal-content { background-color: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 100%; max-width: 350px; margin-top: 50px; }
        .choice-btn { width: 100%; padding: 16px; font-size: 1.3rem; font-weight: bold; color: #1a1a1a; background-color: var(--gold); border: none; border-radius: 12px; cursor: pointer; margin-bottom: 15px; }

        .main-content { display: none; width: 100%; max-width: 900px; text-align: center; }
        
        /* أدوات التحكم العلوية (إضافة عضو) */
        .tools-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #333; padding: 10px 20px; border-radius: 10px; border: 1px dashed var(--gold); }
        .add-member-btn { background-color: var(--gold); color: #1a1a1a; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        /* الجدول */
        .info-table { width: 100%; border-collapse: collapse; background-color: var(--card); margin-bottom: 20px; }
        .info-table th, .info-table td { border: 1px solid #444; padding: 10px; text-align: center; }
        .info-table th { background-color: #333; color: var(--gold); }
        input[type="text"], select { width: 90%; padding: 8px; background: var(--bg); color: #fff; border: 1px solid var(--gold); border-radius: 5px; text-align: center; }

        /* شبكة الأسماء */
        .names-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .name-card { background-color: #333; border: 1px solid #444; padding: 15px 5px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .name-card.present { background-color: #1e4620; border-color: #4caf50; font-weight: bold; }
        .name-card.present::after { content: ' ✓'; }

        /* أزرار الإجراءات */
        .actions { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        .save-btn { background-color: #4caf50; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .back-btn { background-color: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 12px 20px; border-radius: 8px; cursor: pointer; }

        /* النافذة المنبثقة لإضافة اسم */
        #addPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .popup-box { background: var(--card); padding: 25px; border-radius: 15px; border: 2px solid var(--gold); width: 80%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

    <header class="site-header" onclick="goHome()">
        <img src="m-logo.png" alt="شعار" class="site-logo" onerror="this.src='m-logo'">
        <h1 class="site-title">موكب راية الهدى بالجارودية</h1>
    </header>

    <div class="main-wrapper">
        <div id="welcomeModal" class="modal-content">
            <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
            <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
        </div>

        <div id="mainContent" class="main-content">
            <div class="tools-bar">
                <span style="font-weight: bold; color: var(--gold);">إدارة الكادر</span>
                <button class="add-member-btn" onclick="showPopup()">+ إضافة عضو جديد</button>
            </div>

            <table class="info-table">
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>عنوان الجلسة</th>
                        <th>التحضير بواسطة</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="currentDate"></td>
                        <td><input type="text" id="sessionTitle" placeholder="مثلاً: اجتماع الكادر"></td>
                        <td>
                            <select id="preparedBy">
                                <option value="">اختر الاسم...</option>
                                <option>نادر المعراج</option><option>عباس المعلم</option>
                                <option>حسن المعراج</option><option>سيد محمد نوري</option><option>حسن الرمضان</option>
                            </select>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="names-grid" id="namesGrid"></div>

            <div class="actions">
                <button class="save-btn" onclick="saveData()">💾 حفظ البيانات</button>
                <button class="back-btn" onclick="goHome()">⬅ العودة</button>
            </div>
        </div>
    </div>

    <div id="addPopup">
        <div class="popup-box">
            <h3 style="color: var(--gold); margin-top: 0;">إضافة عضو جديد</h3>
            <input type="text" id="newMemberName" placeholder="اكتب الاسم هنا..." style="width: 100%; margin-bottom: 15px;">
            <div style="display: flex; gap: 10px;">
                <button class="save-btn" style="padding: 8px; flex: 1;" onclick="addNewMember()">إضافة</button>
                <button class="back-btn" style="padding: 8px; flex: 1;" onclick="hidePopup()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        let members = ["أحمد آل ضيف", "أحمد عبدالعزيز المرهون", "أحمد علي الجارودي", "أمير العيد", "أمير عادل السليمان", "أويس عادل السليمان", "السيد علي نبيل السادة", "السيد هادي ال هاشم", "السيد حيدر ماجد آل كاظم", "جارود غازي الجارودي", "جواد رضا المرهون", "حسن جميل آل أحمد", "حسن سعود الحيبة", "حسن عبدالحميد الرمضان", "حسن محمد السليمان", "حسين علي المدن", "حيدر علي أبو قرين", "حيدر نادر المعراج", "رضا نسيم آل عويشير", "عبدالله عباس المعلم", "علي إبراهيم المعلم", "علي حسين أبو قرين", "علي حسين المعراج", "علي سعيد المعلم", "علي صالح شهاب", "كرار عبدالرحيم لاجامي", "محسن علي خليف", "محمد جعفر العيد", "محمد عبدالحميد لاجامي", "محمد عبدالله السليمان", "محمد لطفي السليمان", "محمد نذير المعلم", "مصطفى إسماعيل الأصيل", "منتظر محمد آل رمضان", "مهدي خالد آل سليم", "مهدي محمد العلقم", "ميرزا عباس المعلم"];

        function renderNames() {
            const grid = document.getElementById('namesGrid');
            grid.innerHTML = '';
            members.sort().forEach(name => {
                const div = document.createElement('div');
                div.className = 'name-card';
                div.innerText = name;
                div.onclick = () => div.classList.toggle('present');
                grid.appendChild(div);
            });
        }

        function selectSection(name) {
            if(name === 'مهدويون') {
                document.getElementById('welcomeModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB');
                renderNames();
            }
        }

        function showPopup() { document.getElementById('addPopup').style.display = 'flex'; }
        function hidePopup() { document.getElementById('addPopup').style.display = 'none'; document.getElementById('newMemberName').value = ''; }

        function addNewMember() {
            const name = document.getElementById('newMemberName').value.trim();
            if(name) { members.push(name); renderNames(); hidePopup(); }
        }

        function saveData() {
            const presentMembers = Array.from(document.querySelectorAll('.name-card.present')).map(el => el.innerText);
            const data = {
                date: document.getElementById('currentDate').innerText,
                title: document.getElementById('sessionTitle').value,
                by: document.getElementById('preparedBy').value,
                count: presentMembers.length,
                names: presentMembers.join(', ')
            };
            if(!data.by) { alert('يرجى اختيار اسم المسؤول عن التحضير'); return; }
            alert(`تم حفظ البيانات بنجاح!\nالعنوان: ${data.title}\nالعدد المحضر: ${data.count}\nالمسؤول: ${data.by}`);
            console.log("بيانات الجلسة:", data);
        }

        function goHome() { document.getElementById('mainContent').style.display = 'none'; document.getElementById('welcomeModal').style.display = 'block'; }
    </script>
</body>
</html>
