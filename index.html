<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب راية الهدى بالجارودية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .site-header {
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background-color: #262626;
            border-bottom: 2px solid #d4af37;
        }
        .site-logo { width: 60px; height: auto; }
        .site-title { color: #d4af37; font-size: 1.8rem; margin: 0; }
        .modal-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .modal-content {
            background-color: #262626;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #d4af37;
            text-align: center;
            width: 85%;
            max-width: 350px;
        }
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .choice-btn {
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .main-content { display: none; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="logo.png" alt="شعار الموكب" class="site-logo">
        <h1 class="site-title">موكب راية الهدى بالجارودية</h1>
    </header>

    <div id="welcomeModal" class="modal-container">
        <div class="modal-content">
            <p style="font-size: 1.1rem;">يرجى اختيار القسم المخصص لكم:</p>
            <div class="btn-container">
                <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
                <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="main-content">
        <h2 style="color: #d4af37;">أهلاً بك في قسم <span id="sectionName"></span></h2>
        <p>خِدّمة أهل البيت عليهم السلام - الجارودية</p>
    </div>

    <script>
        function selectSection(name) {
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('sectionName').innerText = name;
        }
    </script>
</body>
</html>
