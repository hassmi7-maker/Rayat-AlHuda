<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب راية الهدى بالجارودية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* الترويسة العليا: متجاوبة مع الجوال */
        .site-header {
            width: 100%;
            padding: 15px 0;
            display: flex;
            flex-direction: column; /* ترتيب عمودي للجوال */
            justify-content: center;
            align-items: center;
            gap: 10px;
            background-color: #262626;
            border-bottom: 2px solid #d4af37;
        }

        /* ضبط حجم الشعار للجوال */
        .site-logo {
            width: 70px; 
            height: auto;
        }

        .site-title {
            color: #d4af37;
            font-size: 1.5rem; /* أصغر قليلاً للجوال */
            margin: 0;
            font-weight: bold;
            text-align: center;
        }

        .modal-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 0;
        }

        .modal-content {
            background-color: #262626;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #d4af37;
            text-align: center;
            width: 85%;
            max-width: 350px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .choice-btn {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%; /* تأخذ عرض الصندوق بالكامل */
        }

        /* تعديلات للشاشات الأكبر (الكمبيوتر) */
        @media (min-width: 768px) {
            .site-header {
                flex-direction: row; /* ترتيب أفقي للكمبيوتر */
                padding: 25px 0;
            }
            .site-logo { width: 90px; }
            .site-title { font-size: 2.2rem; }
        }

        .main-content { display: none; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="m-logo.png" alt="شعار الموكب" class="site-logo">
        <h1 class="site-title">موكب راية الهدى بالجارودية</h1>
    </header>

    <div id="welcomeModal" class="modal-container">
        <div class="modal-content">
            <p style="font-size: 1.1rem; margin: 0;">يرجى اختيار القسم المخصص لكم:</p>
            <div class="btn-container">
                <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
                <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="main-content">
        <h2 style="color: #d4af37;">أهلاً بك في قسم <span id="sectionName"></span></h2>
    </div>

    <script>
        function selectSection(name) {
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('sectionName').innerText = name;
        }
    </script>
</body>
</html>
