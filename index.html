<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب راية الهدى بالجارودية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* الترويسة: تصميم مرن لضمان التوسيط وظهور الشعار */
        .site-header {
            width: 100%;
            background-color: #262626;
            border-bottom: 2px solid #d4af37;
            padding: 15px 0;
            display: flex;
            flex-direction: column; /* عمودي للجوال */
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
        }

        .site-logo {
            width: 90px; /* حجم واضح للشعار */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .site-title {
            color: #d4af37;
            font-size: 1.6rem;
            margin: 0;
            padding: 0 10px;
            font-weight: bold;
            line-height: 1.4;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #262626;
            padding: 35px 25px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .choice-btn {
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .choice-btn:active {
            transform: scale(0.95);
        }

        /* تعديلات الكمبيوتر */
        @media (min-width: 768px) {
            .site-header {
                flex-direction: row; /* أفقي للكمبيوتر */
                padding: 25px 0;
                gap: 20px;
            }
            .site-title { font-size: 2.5rem; }
            .site-logo { width: 110px; }
        }

        .main-content { display: none; text-align: center; }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="m-logo.png" alt="شعار الموكب" class="site-logo">
        <h1 class="site-title">موكب راية الهدى بالجارودية</h1>
    </header>

    <div class="main-wrapper">
        <div id="welcomeModal" class="modal-content">
            <div class="btn-container">
                <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
                <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
            </div>
        </div>

        <div id="mainContent" class="main-content">
            <h2 style="color: #d4af37; font-size: 2.5rem;">قسم <span id="sectionName"></span></h2>
            <p>مرحباً بكم في موكب راية الهدى</p>
        </div>
    </div>

    <script>
        function selectSection(name) {
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('sectionName').innerText = name;
        }
    </script>
</body>
</html>
