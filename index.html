<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب راية الهدى بالجارودية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* الترويسة: جعل العنوان قابل للضغط */
        .site-header {
            width: 100%;
            background-color: #262626;
            border-bottom: 2px solid #d4af37;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            cursor: pointer; /* يظهر شكل اليد عند التأشير */
        }

        .site-logo {
            width: 100px;
            height: auto;
        }

        .site-title {
            color: #d4af37;
            font-size: 1.8rem;
            margin: 0;
            font-weight: bold;
            padding: 0 15px;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #262626;
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            text-align: center;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .choice-btn {
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* تنسيق قسم المحتوى الداخلي */
        .main-content {
            display: none;
            text-align: center;
            padding: 40px;
            width: 100%;
        }

        /* زر العودة للخلف داخل القسم */
        .back-btn {
            margin-top: 30px;
            padding: 10px 25px;
            background-color: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #d4af37;
            color: #1a1a1a;
        }

        @media (min-width: 768px) {
            .site-header { flex-direction: row; gap: 25px; padding: 30px 0; }
            .site-title { font-size: 2.5rem; }
            .site-logo { width: 120px; }
        }
    </style>
</head>
<body>

    <header class="site-header" onclick="goHome()">
        <img src="m-logo.png" alt="شعار الموكب" class="site-logo" onerror="this.src='m-logo'">
        <h1 class="site-title">موكب راية الهدى بالجارودية</h1>
    </header>

    <div class="main-wrapper">
        <div id="welcomeModal" class="modal-content">
            <div class="btn-container">
                <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
                <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
            </div>
        </div>

        <div id="mainContent" class="main-content">
            <h2 style="color: #d4af37; font-size: 2.5rem;">قسم <span id="sectionName"></span></h2>
            <p>خِدّمة أهل البيت عليهم السلام - الجارودية</p>
            
            <button class="back-btn" onclick="goHome()">⬅ العودة للرئيسية</button>
        </div>
    </div>

    <script>
        // دالة اختيار القسم
        function selectSection(name) {
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('sectionName').innerText = name;
            // رفع الصفحة للأعلى عند الانتقال
            window.scrollTo(0, 0);
        }

        // دالة العودة لصفحة البداية
        function goHome() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('welcomeModal').style.display = 'block';
        }
    </script>
</body>
</html>
