<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب راية الهدى بالجارودية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* الترويسة: ضبط التوسيط التلقائي */
        .site-header {
            width: 100%;
            background-color: #262626;
            border-bottom: 2px solid #d4af37;
            padding: 20px 0;
            display: flex;
            flex-direction: column; /* ترتيب عمودي للجوال */
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 15px;
        }

        .site-logo {
            width: 80px; /* حجم مناسب للجوال والكمبيوتر */
            height: auto;
            display: block;
        }

        .site-title {
            color: #d4af37;
            font-size: 1.5rem; /* حجم مناسب للجوال */
            margin: 0;
            padding: 0 15px;
            font-weight: bold;
        }

        /* حاوية المحتوى الرئيسي لضمان التوسيط */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #262626;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #d4af37;
            text-align: center;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .choice-btn {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* تعديلات للشاشات الكبيرة (الكمبيوتر) */
        @media (min-width: 768px) {
            .site-header {
                flex-direction: row; /* ترتيب أفقي للكمبيوتر */
                padding: 30px 0;
            }
            .site-title { font-size: 2.2rem; }
            .site-logo { width: 100px; }
        }

        .main-content { display: none; text-align: center; }
    </style>
</head>
<body>

    <header class="site-header">
        <img src="m-logo.png" alt="شعار الموكب" class="site-logo">
        <h1 class="site-title">موكب راية الهدى بالجارودية</h1>
    </header>

    <div class="main-wrapper">
        <div id="welcomeModal" class="modal-content">
            <p style="font-size: 1.1rem; margin-bottom: 20px;">يرجى اختيار القسم المخصص لكم:</p>
            <div class="btn-container">
                <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
                <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
            </div>
        </div>

        <div id="mainContent" class="main-content">
            <h2 style="color: #d4af37;">أهلاً بك في قسم <span id="sectionName"></span></h2>
        </div>
    </div>

    <script>
        function selectSection(name) {
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('sectionName').innerText = name;
        }
    </script>
</body>
</html>
