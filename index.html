<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب رايات الهدى - الجارودية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #262626;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #d4af37;
            text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            max-width: 400px; width: 90%;
        }
        h2 { color: #d4af37; margin-bottom: 30px; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        .choice-btn {
            padding: 15px; font-size: 1.2rem; font-weight: bold;
            color: #1a1a1a; background-color: #d4af37;
            border: none; border-radius: 10px; cursor: pointer;
            transition: 0.3s;
        }
        .choice-btn:hover { background-color: #f1c40f; transform: scale(1.05); }
        .main-content { text-align: center; display: none; } /* مخفي حتى يتم الاختيار */
    </style>
</head>
<body>

    <div id="welcomeModal" class="modal-overlay">
        <div class="modal-content">
            <h2>مرحباً بكم في موكب رايات الهدى</h2>
            <p>يرجى اختيار القسم المخصص لكم:</p>
            <div class="btn-container">
                <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
                <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="main-content">
        <h1 id="displayTitle" style="color: #d4af37;">موكب رايات الهدى - الجارودية</h1>
        <p id="displaySub">أهلاً بك في قسم <span id="sectionName"></span></p>
    </div>

    <script>
        function selectSection(name) {
            document.getElementById('welcomeModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('sectionName').innerText = name;
        }
    </script>
</body>
</html>
