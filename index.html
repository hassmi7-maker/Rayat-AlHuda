<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موكب راية الهدى بالجارودية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f4f4f4;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .site-header {
            width: 100%;
            background-color: #262626;
            border-bottom: 2px solid #d4af37;
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
        }

        .site-logo { width: 80px; height: auto; }
        .site-title { color: #d4af37; font-size: 1.6rem; margin: 0; font-weight: bold; }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #262626;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #d4af37;
            text-align: center;
            width: 100%;
            max-width: 350px;
            margin-top: 50px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 15px; }

        .choice-btn {
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1a1a1a;
            background-color: #d4af37;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .main-content { display: none; width: 100%; max-width: 900px; text-align: center; }
        
        /* الجدول العلوي */
        .info-table {
            width: 100%;
            margin-bottom: 30px;
            border-collapse: collapse;
            background-color: #262626;
        }

        .info-table th, .info-table td {
            border: 1px solid #444;
            padding: 12px;
            text-align: center;
        }

        .info-table th { background-color: #333; color: #d4af37; }

        input[type="text"], select {
            width: 90%;
            padding: 8px;
            background-color: #1a1a1a;
            color: #f4f4f4;
            border: 1px solid #d4af37;
            border-radius: 5px;
            text-align: center;
        }

        /* شبكة الأسماء */
        .names-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
            padding: 10px;
        }

        .name-card {
            background-color: #333;
            border: 1px solid #444;
            padding: 15px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            user-select: none;
        }

        /* حالة التحضير (أخضر) */
        .name-card.present {
            background-color: #1e4620;
            border-color: #4caf50;
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .name-card.present::after {
            content: ' ✓';
            margin-right: 5px;
            font-weight: bold;
        }

        .back-btn {
            margin: 40px 0;
            padding: 10px 30px;
            background-color: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .site-header { flex-direction: row; gap: 20px; }
            .site-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header class="site-header" onclick="goHome()">
        <img src="m-logo.png" alt="شعار" class="site-logo" onerror="this.src='m-logo'">
        <h1 class="site-title">موكب راية الهدى بالجارودية</h1>
    </header>

    <div class="main-wrapper">
        <div id="welcomeModal" class="modal-content">
            <div class="btn-container">
                <button class="choice-btn" onclick="selectSection('مهدويون')">مهدويون</button>
                <button class="choice-btn" onclick="selectSection('أشبال الراية')">أشبال الراية</button>
            </div>
        </div>

        <div id="mainContent" class="main-content">
            <h2 style="color: #d4af37; margin-bottom: 20px;">قسم مهدويون</h2>
            
            <table class="info-table">
                <thead>
                    <tr>
                        <th>التاريخ (ميلادي)</th>
                        <th>عنوان الجلسة</th>
                        <th>التحضير بواسطة</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="currentDate">-- / -- / ----</td>
                        <td><input type="text" placeholder="اكتب العنوان هنا..."></td>
                        <td>
                            <select>
                                <option value="">اختر الاسم...</option>
                                <option>نادر المعراج</option>
                                <option>عباس المعلم</option>
                                <option>حسن المعراج</option>
                                <option>سيد محمد نوري</option>
                                <option>حسن الرمضان</option>
                            </select>
                        </td>
                    </tr>
                </tbody>
            </table>

            <h3 style="color: #d4af37; text-align: right; margin-right: 10px;">كشف التحضير:</h3>
            <div class="names-grid" id="namesGrid">
                </div>

            <button class="back-btn" onclick="goHome()">⬅ العودة للرئيسية</button>
        </div>
    </div>

    <script>
        const members = [
            "أحمد آل ضيف", "أحمد عبدالعزيز المرهون", "أحمد علي الجارودي", "أمير العيد",
            "أمير عادل السليمان", "أويس عادل السليمان", "السيد علي نبيل السادة", "السيد هادي ال هاشم",
            "السيد حيدر ماجد آل كاظم", "جارود غازي الجارودي", "جواد رضا المرهون", "حسن جميل آل أحمد",
            "حسن سعود الحيبة", "حسن عبدالحميد الرمضان", "حسن محمد السليمان", "حسين علي المدن",
            "حيدر علي أبو قرين", "حيدر نادر المعراج", "رضا نسيم آل عويشير", "عبدالله عباس المعلم",
            "علي إبراهيم المعلم", "علي حسين أبو قرين", "علي حسين المعراج", "علي سعيد المعلم",
            "علي صالح شهاب", "كرار عبدالرحيم لاجامي", "محسن علي خليف", "محمد جعفر العيد",
            "محمد عبدالحميد لاجامي", "محمد عبدالله السليمان", "محمد لطفي السليمان", "محمد نذير المعلم",
            "مصطفى إسماعيل الأصيل", "منتظر محمد آل رمضان", "مهدي خالد آل سليم", "مهدي محمد العلقم",
            "ميرزا عباس المعلم"
        ];

        function initNames() {
            const grid = document.getElementById('namesGrid');
            grid.innerHTML = '';
            members.forEach(name => {
                const div = document.createElement('div');
                div.className = 'name-card';
                div.innerText = name;
                div.onclick = function() {
                    this.classList.toggle('present');
                };
                grid.appendChild(div);
            });
        }

        function selectSection(name) {
            if(name === 'مهدويون') {
                document.getElementById('welcomeModal').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                const today = new Date();
                document.getElementById('currentDate').innerText = today.toLocaleDateString('en-GB');
                initNames();
            }
        }

        function goHome() {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('welcomeModal').style.display = 'block';
        }
    </script>
</body>
</html>
